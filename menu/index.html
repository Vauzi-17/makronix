<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Makronix</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
</head>

<body>
    <section class="header">
        <a href="../"><i class="fa-solid fa-arrow-left"></i><span class="btn-label"> Kembali</span></a>
        <div class="header-title">
            <span class="header-badge">DAFTAR MENU</span>
            <h1>Pilih Favoritmu di<em>Makronix!</em></h1>
        </div>
    </section>

    <section class="banner">
        <div class="banner-track">
            <div class="banner-slide"><img src="/assets/banner/banner1.png" alt="Banner 1"></div>
            <div class="banner-slide"><img src="/assets/banner/banner2.png" alt="Banner 2"></div>
            <div class="banner-slide"><img src="/assets/banner/banner3.png" alt="Banner 3"></div>
            <div class="banner-slide"><img src="/assets/banner/banner4.png" alt="Banner 4"></div>
        </div>

        <button class="banner-btn banner-prev">&#10094;</button>
        <button class="banner-btn banner-next">&#10095;</button>

        <div class="banner-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <section class="menu-list">
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Spicy-Crunch.png" alt="Makronix Spicy Crunch">
            <h2>Makronix Spicy Crunch</h2>
            <h2>Rp. 25.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Classic-Crunch.png" alt="Makronix Classic Crunch">
            <h2>Makronix Classic Crunch</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Varian-Crunch.png" alt="Makronix Varian Crunch">
            <h2>Makronix Varian Crunch</h2>
            <h2>Rp. 10.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Spicy-Melt.png" alt="Makronix Spicy Melt">
            <h2>Makronix Spicy Melt</h2>
            <h2>Rp. 25.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Ori-Classic.png" alt="Makronix Ori Classic">
            <h2>Makronix Ori Classic</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-CLassic-Cheese.png" alt="Makronix Classic Cheese">
            <h2>Makronix Classic Cheese</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn"><i class="fa-solid fa-cart-plus"></i> Add</button>
        </div>
    </section>
    <!-- Floating Cart Button -->
    <button class="cart-fab" id="cartFab">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartBadge">0</span>
    </button>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h2>Keranjang</h2>
            <button class="cart-close" id="cartClose"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="cart-items" id="cartItems">

        </div>

        <div class="cart-footer" id="cartFooter">
            <div class="cart-total">
                <span>Total</span>
                <strong id="cartTotal">Rp. 0</strong>
            </div>
            <div class="cart-wa-wrap">
                <label>Pesan WA:</label>
                <textarea id="waMessage" rows="5"></textarea>
            </div>
            <button class="cart-send-btn" id="cartSend">
                <i class="fa-brands fa-whatsapp"></i> Kirim ke WhatsApp
            </button>
        </div>
    </div>
    <script src="/menu/script.js"></script>
    <script src="/menu/cart.js"></script>
</body>

</html>
