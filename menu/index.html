<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Makronix</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
</head>
<body>
    <section class="header">
        <a href="../"><i class="fa-solid fa-arrow-left"></i></a>
        <h1>Menu</h1>
    </section>

    <section class="menu-list">
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Spicy-Crunch.png" alt="Makronix Spicy Crunch">
            <h2>Makronix Spicy Crunch</h2>
            <h2>Rp. 25.000</h2>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Classic-Crunch.png" alt="Makronix Classic Crunch">
            <h2>Makronix Classic Crunch</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Varian-Crunch.png" alt="Makronix Varian Crunch">
            <h2>Makronix Varian Crunch</h2>
            <h2>Rp. 10.000</h2>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Spicy-Melt.png" alt="Makronix Spicy Melt">
            <h2>Makronix Spicy Melt</h2>
            <h2>Rp. 25.000</h2>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-Ori-Classic.png" alt="Makronix Ori Classic">
            <h2>Makronix Ori Classic</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-card">
            <img src="/assets/menu/Makronix-CLassic-Cheese.png" alt="Makronix Classic Cheese">
            <h2>Makronix Classic Cheese</h2>
            <h2>Rp. 15.000</h2>
            <button class="add-btn">Add</button>
        </div>
    </section>

</body>
</html>
